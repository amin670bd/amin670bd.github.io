<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Amin670BD</title>
  <meta name="robots" content="noindex">
  <meta name="description" content="Page not found. Return to Md. Asaduzzaman (Aminur)'s portfolio.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      background: linear-gradient(135deg, #022c22, #021a17, #022c22);
      background-size: 200% 200%;
      animation: gradient-shift 10s ease infinite;
      color: #cbd5e1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.65;
    }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .card {
      background: rgba(5,46,33,0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(45,212,191,0.12);
      border-radius: 24px;
      padding: 56px 40px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 40px rgba(20,184,166,0.15);
      animation: fadeInUp 0.6s ease forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .code {
      font-size: 4.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #065f46, #0d9488, #059669);
      background-size: 200% 200%;
      animation: gradient-shift 4s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #2dd4bf;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #e2e8f0;
      margin-bottom: 16px;
    }
    p {
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 36px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #065f46, #0d9488, #059669);
      background-size: 200% 200%;
      animation: gradient-shift 4s ease infinite;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
      box-shadow: 0 4px 15px rgba(20,184,166,0.3);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn:hover::before {
      transform: translateX(100%);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(20,184,166,0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
      .code { font-size: 3.5rem; }
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <span class="tag">Page Not Found</span>
    <h1>Oops! This page wandered off.</h1>
    <p>The link you followed may be broken, or the page has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      Back to Home
    </a>
  </div>
</body>
</html>
